name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Package dist as zip
        run: (cd dist && zip -r "../power-automate-editor-version-enforcer-${{ github.ref_name }}.zip" .)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: power-automate-editor-version-enforcer-${{ github.ref_name }}.zip
          generate_release_notes: true
